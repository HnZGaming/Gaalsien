# =====================================================
# CAMP (Construction & Assembly Material Processor)
# Configuration File
# =====================================================
# This file controls global settings for ALL CAMP blocks in the world.
# Changes take effect after server restart or use !campdebug configreload
# Lines starting with # are comments.

# =====================================================
# PERFORMANCE SETTINGS
# =====================================================
# Blocks scanned per tick (higher = faster but more CPU usage)
BlocksPerTickNormal = 100
BlocksPerTickDedicated = 150
# Minimum ticks between scans
ScanThrottleTicks = 100
FastProjectorScanIntervalTicks = 60

# =====================================================
# WORK SPEED SETTINGS
# =====================================================
# Multipliers for welding and grinding speed
WeldSpeedMultiplier = 1
GrindSpeedMultiplier = 1
# Base amounts per second (before multipliers)
BaseWeldAmountPerSecond = 1
BaseGrindAmountPerSecond = 4
MaxRepairBoneMovementSpeed = 0.2

# =====================================================
# POWER CONSUMPTION SETTINGS (in MW)
# =====================================================
BaseIdlePowerMW = 0.005
CostHelpOthersMW = 0.125
CostAutoPickupMW = 0.05
CostSuitRegenMW = 0.25
CostTargetFurthestMW = 0.025
CostShowPickupIndicatorsMW = 0.005
CostShowWeldIndicatorsMW = 0.005
CostBoxVisibleMW = 0.005
CostPerRadiusBlockMW = 0.0025
CostProjectionAssistMW = 0.125

# =====================================================
# AREA LIMITS
# =====================================================
MinAreaRadiusInBlocks = 5
MaxAreaRadiusInBlocks = 250
DefaultAreaRadiusInBlocks = 5
MinOffset = -500
MaxOffset = 500

# =====================================================
# DELAY SETTINGS (in seconds)
# =====================================================
DefaultPickupDelaySeconds = 3
MinPickupDelaySeconds = 3
MaxPickupDelaySeconds = 30
DefaultWeldDelaySeconds = 3
MinWeldDelaySeconds = 3
MaxWeldDelaySeconds = 10

# =====================================================
# PICKUP SETTINGS
# =====================================================
# Percentage of inventory to fill per pickup batch (0.01 to 1.0)
PickupBatchVolumePercentage = 0.25
ScanFloatingObjectsThrottleTicks = 60

# =====================================================
# INVENTORY TRANSFER SETTINGS
# =====================================================
# How often to transfer items from grind targets (in seconds, 1-30)
GrindTransferIntervalSeconds = 5
# How often to transfer floating objects/bags (in seconds, 0.5-10)
FloatingObjectTransferIntervalSeconds = 2
# Percentage of total free volume to transfer per batch (0.05-0.5)
TransferBatchVolumePercentage = 0.15

# =====================================================
# SUIT REGENERATION SETTINGS
# =====================================================
SuitRegenIntervalSec = 5
# Amount regenerated per interval (0.0 to 1.0)
SuitRegenAmount = 0.1

# =====================================================
# TIMEOUT & THROTTLE SETTINGS (in ticks, 60 ticks = 1 second)
# =====================================================
StuckTimeoutTicks = 180
CleanupWeldTargetsThrottleTicks = 300
CleanupPickupTargetsThrottleTicks = 180
PushInventoryThrottleTicks = 60

# =====================================================
# ADVANCED SETTINGS
# =====================================================
# Default value for 'Best Effort Welding' on newly placed CAMP blocks
# When True, CAMP will weld blocks even if not all components are available
EnableBestEffortWelding = True
# Enable debug logging (outputs detailed logs to console - set to True for troubleshooting)
EnableDebugLogging = False

# =====================================================
# CAMP DRILL SETTINGS
# =====================================================
# Area dimension limits (blocks)
DrillMinAreaSize = 1
DrillMaxAreaSize = 25
# Area offset limits (blocks)
DrillMinOffset = -100
DrillMaxOffset = 100
# Speed multiplier range
DrillMinSpeedMultiplier = 1
DrillMaxSpeedMultiplier = 10
# Base idle power draw in MW (should match SBC RequiredPowerInput)
DrillBasePowerMW = 0.15
# Voxels mined per batch operation
DrillVoxelsPerOperation = 50
# Ticks between mining operations (60 ticks = 1 second)
DrillTicksBetweenOperations = 54
# Ore yield multiplier (0.24 = 24% yield)
DrillHarvestRateMultiplier = 0.24
# Speed bonus when mining terrain/stone (1.5 = 50% faster)
DrillTerrainModeMultiplier = 1.5
# Mining queue section width in voxels (spatial sorting)
DrillSectionSize = 3
# Pause mining when inventory fill reaches this percentage (0.0-1.0)
DrillInventoryPauseThreshold = 0.9

# =====================================================
# SCANNING & PERFORMANCE TUNING
# =====================================================
# Minimum seconds between scans when no valid targets found
ScanIntervalNoTargetsSeconds = 30
# Default target scan interval in seconds
TargetScanIntervalDefaultSeconds = 10
# Inventory rescan interval in seconds
InventoryScanIntervalSeconds = 60
# Scan duration thresholds for dynamic interval adjustment (ms)
ScanTimeHighThresholdMs = 40
ScanTimeLowThresholdMs = 5
# Dynamic scan interval bounds (seconds)
ScanIntervalMinSeconds = 1
ScanIntervalMaxSeconds = 3
# Maximum simultaneous background scan jobs
MaxBackgroundJobs = 4
# LRU grid cache limit
MaxCachedGrids = 50
# Grid cache time-to-live in seconds
GridCacheTTLSeconds = 8
# Maximum targets to collect per scan
MaxGrindTargetsToCollect = 100
MaxWeldTargetsToCollect = 200
# Grace period ticks before first scan after block placement
StartupGracePeriodTicks = 120

# =====================================================
# SCAN DYNAMIC ADJUSTMENT
# =====================================================
# Multipliers for scan interval slowdown (when scan takes too long)
ScanSlowdownMultiplierDedicated = 1.25
ScanSlowdownMultiplierRegular = 1.5
# Multipliers for scan interval speedup (when scan is fast)
ScanSpeedupMultiplierDedicated = 0.6
ScanSpeedupMultiplierRegular = 0.75

# =====================================================
# STUCK DETECTION & RECOVERY
# =====================================================
# Consecutive stuck checks before abandoning target
StuckThresholdBestEffort = 20
StuckThresholdStrict = 10
# Timeout multiplier for best-effort mode stuck detection
StuckTimeoutMultiplierBestEffort = 2
# Ticks of recent progress before resetting stuck counter
RecentProgressThresholdTicks = 120
# Consecutive stuck checks before performing stuck recovery
MaxConsecutiveStuckChecks = 10
# Minimum seconds between stuck recovery attempts
StuckRecoveryCooldownSeconds = 30
# Minimum seconds between inventory re-registrations during recovery
InventoryRegistrationIntervalSeconds = 30

# =====================================================
# CLAIM & GRACE PERIODS
# =====================================================
# Block claim expiration timeout in seconds
ClaimExpirationSeconds = 30
# Grace ticks after projection block placement before target switch
ProjectionPlacementGraceTicks = 180
# Maximum BFS depth for connected grid search
MaxConnectedGridSearchDepth = 10

# =====================================================
# FLOATING OBJECT & INVENTORY MANAGEMENT
# =====================================================
# Maximum entities scanned per floating object scan
FloatingPickupMaxScanEntities = 500
# Maximum tracked floating objects pool size
FloatingPickupMaxPoolSize = 2000
# Pause pickup when grid utilization reaches this threshold (0.0-1.0)
FloatingPickupGridUtilizationThreshold = 0.95
# Full inventory scan interval in ticks
InventoryFullScanIntervalTicks = 300
# Incremental inventory update interval in ticks
InventoryIncrementalUpdateIntervalTicks = 30
# Inventory cache cleanup interval in ticks
InventoryCleanupIntervalTicks = 600
# Maximum CAMP blocks processed per tick for inventory
InventoryMaxCampsPerTick = 1
# Maximum inventory scans per tick
InventoryMaxScansPerTick = 1

# =====================================================
# ASSEMBLER QUEUE & LCD SETTINGS
# =====================================================
# Global enable for auto-assembler queue feature (per-block toggle still required)
EnableAutoAssemblerQueue = False
# Ticks between assembler queue recalculations (60 = 1 second)
AssemblerQueueUpdateIntervalTicks = 300
# Maximum amount of any single component to queue at once
AssemblerMaxQueuePerComponent = 1000
# Whether to search connected grids for assemblers
AssemblerQueueConnectedGrids = True
# Global enable for LCD display feature
EnableLcdDisplay = True
# Ticks between LCD content updates (60 = 1 second)
LcdUpdateIntervalTicks = 120
# Tag to search for in LCD panel names
LcdTagName = [CAMP]
# Power cost when assembler queueing is active (MW)
CostAssemblerQueueMW = 0.05
# Power cost when LCD display is active (MW)
CostLcdDisplayMW = 0.01

# =====================================================
# END OF CONFIGURATION
# =====================================================
